<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Math Dungeon - 關卡管理</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft JhengHei', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      color: #e0e0e0;
    }

    .login-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .login-box {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      backdrop-filter: blur(10px);
    }

    .login-box h1 {
      text-align: center;
      font-size: 28px;
      margin-bottom: 10px;
      color: #ffd700;
      text-shadow: 0 0 20px rgba(255,215,0,0.5);
    }

    .login-box p {
      text-align: center;
      color: #888;
      margin-bottom: 30px;
      font-size: 14px;
    }

    .input-group {
      margin-bottom: 20px;
    }

    .input-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      color: #aaa;
    }

    .input-group input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      background: rgba(255,255,255,0.05);
      color: #fff;
      font-size: 16px;
      transition: all 0.3s;
    }

    .input-group input:focus {
      outline: none;
      border-color: #ffd700;
      background: rgba(255,215,0,0.05);
    }

    .login-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #ffd700 0%, #ff8c00 100%);
      border: none;
      border-radius: 10px;
      color: #1a1a2e;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(255,215,0,0.3);
    }

    .error-msg {
      color: #ff6b6b;
      text-align: center;
      margin-top: 15px;
      font-size: 14px;
      display: none;
    }

    /* Admin Panel */
    .admin-container {
      display: none;
      padding: 20px;
      max-width: 900px;
      margin: 0 auto;
    }

    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 30px;
      background: rgba(255,255,255,0.05);
      border-radius: 15px;
      margin-bottom: 30px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .admin-header h1 {
      font-size: 24px;
      color: #ffd700;
    }

    .logout-btn {
      padding: 10px 20px;
      background: rgba(255,100,100,0.2);
      border: 1px solid rgba(255,100,100,0.3);
      border-radius: 8px;
      color: #ff6b6b;
      cursor: pointer;
      transition: all 0.3s;
    }

    .logout-btn:hover {
      background: rgba(255,100,100,0.3);
    }

    .section-title {
      font-size: 20px;
      color: #ffd700;
      margin: 30px 0 15px 0;
      padding-left: 15px;
      border-left: 4px solid #ffd700;
    }

    .stage-category {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 15px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .category-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .category-icon {
      font-size: 24px;
    }

    .category-name {
      font-size: 18px;
      font-weight: bold;
      color: #fff;
    }

    .stages-grid {
      display: grid;
      gap: 12px;
    }

    .stage-card {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 20px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      transition: all 0.3s;
    }

    .stage-card:hover {
      background: rgba(255,255,255,0.06);
      border-color: rgba(255,255,255,0.12);
    }

    .stage-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .stage-name {
      font-size: 15px;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .stage-id {
      font-size: 12px;
      color: #666;
    }

    .difficulty-badge {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 4px;
      font-weight: bold;
    }

    .diff-easy { background: rgba(76,175,80,0.2); color: #4caf50; }
    .diff-normal { background: rgba(255,193,7,0.2); color: #ffc107; }
    .diff-hard { background: rgba(244,67,54,0.2); color: #f44336; }
    .diff-boss { background: rgba(156,39,176,0.2); color: #9c27b0; }

    /* Toggle Switch */
    .toggle-switch {
      position: relative;
      width: 56px;
      height: 28px;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(255,255,255,0.1);
      border-radius: 28px;
      transition: 0.3s;
    }

    .toggle-slider:before {
      position: absolute;
      content: "🔒";
      font-size: 12px;
      height: 22px;
      width: 22px;
      left: 3px;
      bottom: 3px;
      background: #555;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.3s;
    }

    .toggle-switch input:checked + .toggle-slider {
      background: rgba(76,175,80,0.4);
    }

    .toggle-switch input:checked + .toggle-slider:before {
      content: "🔓";
      transform: translateX(28px);
      background: #4caf50;
    }

    .save-bar {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: none;
      gap: 15px;
      background: rgba(0,0,0,0.9);
      padding: 15px 25px;
      border-radius: 50px;
      border: 1px solid rgba(255,215,0,0.3);
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }

    .save-bar.show { display: flex; }

    .save-btn {
      padding: 12px 30px;
      background: linear-gradient(135deg, #ffd700 0%, #ff8c00 100%);
      border: none;
      border-radius: 25px;
      color: #1a1a2e;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
    }

    .save-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 5px 20px rgba(255,215,0,0.4);
    }

    .discard-btn {
      padding: 12px 30px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 25px;
      color: #fff;
      cursor: pointer;
      transition: all 0.3s;
    }

    .discard-btn:hover {
      background: rgba(255,255,255,0.2);
    }

    .toast {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 15px 25px;
      background: #4caf50;
      border-radius: 10px;
      color: #fff;
      font-weight: bold;
      opacity: 0;
      transform: translateY(-20px);
      transition: all 0.3s;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .stats-bar {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .stat-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 15px 20px;
      flex: 1;
      min-width: 150px;
    }

    .stat-label {
      font-size: 12px;
      color: #888;
      margin-bottom: 5px;
    }

    .stat-value {
      font-size: 24px;
      font-weight: bold;
      color: #ffd700;
    }

    .stat-value span { color: #888; font-size: 14px; font-weight: normal; }
  </style>
</head>
<body>

<!-- Login Screen -->
<div class="login-container" id="loginScreen">
  <div class="login-box">
    <h1>⚔️ Math Dungeon</h1>
    <p>關卡管理系統</p>
    <div class="input-group">
      <label>管理員密碼</label>
      <input type="password" id="passwordInput" placeholder="請輸入密碼" onkeypress="if(event.key==='Enter')tryLogin()">
    </div>
    <button class="login-btn" onclick="tryLogin()">登入</button>
    <p class="error-msg" id="errorMsg">密碼錯誤，請重新輸入</p>
  </div>
</div>

<!-- Admin Panel -->
<div class="admin-container" id="adminPanel">
  <div class="admin-header">
    <h1>⚔️ 關卡管理系統</h1>
    <button class="logout-btn" onclick="logout()">登出</button>
  </div>

  <div class="stats-bar">
    <div class="stat-card">
      <div class="stat-label">總關卡數</div>
      <div class="stat-value" id="totalStages">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">已啟用</div>
      <div class="stat-value" id="enabledStages">0 <span>/ 總數</span></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">已停用</div>
      <div class="stat-value" id="disabledStages">0</div>
    </div>
  </div>

  <h2 class="section-title">乘法練習</h2>
  <div id="stagesContainer"></div>
</div>

<!-- Save Bar -->
<div class="save-bar" id="saveBar">
  <button class="save-btn" onclick="saveChanges()">儲存變更</button>
  <button class="discard-btn" onclick="discardChanges()">放棄</button>
</div>

<!-- Toast -->
<div class="toast" id="toast">已儲存設定！</div>

<script>
const ADMIN_PASSWORD = 'gundam_admin_2024';
const STORAGE_KEY = 'math_dungeon_stages';
let stagesData = null;
let originalData = null;
let hasChanges = false;

// Default multiplication stages from stages.json
const defaultStages = {
  "multiplication": {
    "2": {
      "name": "2的乘法",
      "stages": [
        {"id": "2-easy", "name": "2的乘法·初", "difficulty": "easy", "enabled": true},
        {"id": "2-normal", "name": "2的乘法·中", "difficulty": "normal", "enabled": true},
        {"id": "2-hard", "name": "2的乘法·終", "difficulty": "hard", "enabled": true}
      ]
    },
    "3": {
      "name": "3的乘法",
      "stages": [
        {"id": "3-easy", "name": "3的乘法·初", "difficulty": "easy", "enabled": true},
        {"id": "3-normal", "name": "3的乘法·中", "difficulty": "normal", "enabled": true},
        {"id": "3-hard", "name": "3的乘法·終", "difficulty": "hard", "enabled": true}
      ]
    },
    "5": {
      "name": "5的乘法",
      "stages": [
        {"id": "5-easy", "name": "5的乘法·初", "difficulty": "easy", "enabled": true},
        {"id": "5-normal", "name": "5的乘法·中", "difficulty": "normal", "enabled": true},
        {"id": "5-hard", "name": "5的乘法·終", "difficulty": "hard", "enabled": true}
      ]
    },
    "boss": {
      "name": "乘法Boss關",
      "stages": [
        {"id": "boss-easy", "name": "史萊姆之王", "difficulty": "boss", "enabled": true}
      ]
    }
  }
};

function tryLogin() {
  const pw = document.getElementById('passwordInput').value;
  if (pw === ADMIN_PASSWORD) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminPanel').style.display = 'block';
    loadStages();
  } else {
    document.getElementById('errorMsg').style.display = 'block';
    document.getElementById('passwordInput').value = '';
    document.getElementById('passwordInput').focus();
  }
}

function logout() {
  if (hasChanges && !confirm('還有未儲存的變更，確定要登出嗎？')) return;
  document.getElementById('adminPanel').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('passwordInput').value = '';
  document.getElementById('saveBar').classList.remove('show');
  hasChanges = false;
}

function loadStages() {
  // Try to load from localStorage first
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    try {
      stagesData = JSON.parse(saved);
    } catch (e) {
      stagesData = JSON.parse(JSON.stringify(defaultStages));
    }
  } else {
    stagesData = JSON.parse(JSON.stringify(defaultStages));
  }
  originalData = JSON.parse(JSON.stringify(stagesData));
  renderStages();
  updateStats();
}

function renderStages() {
  const container = document.getElementById('stagesContainer');
  container.innerHTML = '';

  const categories = ['2', '3', '5', 'boss'];
  const icons = {'2': '2️⃣', '3': '3️⃣', '5': '5️⃣', 'boss': '🐉'};

  categories.forEach(cat => {
    const catData = stagesData.multiplication[cat];
    if (!catData) return;

    const categoryDiv = document.createElement('div');
    categoryDiv.className = 'stage-category';

    const header = document.createElement('div');
    header.className = 'category-header';
    header.innerHTML = `
      <span class="category-icon">${icons[cat]}</span>
      <span class="category-name">${catData.name}</span>
    `;
    categoryDiv.appendChild(header);

    const grid = document.createElement('div');
    grid.className = 'stages-grid';

    catData.stages.forEach(stage => {
      const diffClass = {
        'easy': 'diff-easy',
        'normal': 'diff-normal',
        'hard': 'diff-hard',
        'boss': 'diff-boss'
      }[stage.difficulty] || 'diff-easy';

      const diffLabel = {
        'easy': '初',
        'normal': '中',
        'hard': '終',
        'boss': 'Boss'
      }[stage.difficulty] || stage.difficulty;

      const card = document.createElement('div');
      card.className = 'stage-card';
      card.innerHTML = `
        <div class="stage-info">
          <span class="stage-name">
            ${stage.name}
            <span class="difficulty-badge ${diffClass}">${diffLabel}</span>
          </span>
          <span class="stage-id">${stage.id}</span>
        </div>
        <label class="toggle-switch">
          <input type="checkbox" ${stage.enabled ? 'checked' : ''} 
                 onchange="toggleStage('${cat}', '${stage.id}', this.checked)">
          <span class="toggle-slider"></span>
        </label>
      `;
      grid.appendChild(card);
    });

    categoryDiv.appendChild(grid);
    container.appendChild(categoryDiv);
  });
}

function toggleStage(category, stageId, enabled) {
  const stage = stagesData.multiplication[category].stages.find(s => s.id === stageId);
  if (stage) {
    stage.enabled = enabled;
    hasChanges = true;
    document.getElementById('saveBar').classList.add('show');
    updateStats();
  }
}

function updateStats() {
  let total = 0, enabled = 0, disabled = 0;
  
  Object.values(stagesData.multiplication).forEach(cat => {
    if (cat.stages) {
      cat.stages.forEach(s => {
        total++;
        if (s.enabled) enabled++;
        else disabled++;
      });
    }
  });

  document.getElementById('totalStages').textContent = total;
  document.getElementById('enabledStages').innerHTML = `${enabled} <span>/ 總數</span>`;
  document.getElementById('disabledStages').textContent = disabled;
}

function saveChanges() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(stagesData));
  originalData = JSON.parse(JSON.stringify(stagesData));
  hasChanges = false;
  document.getElementById('saveBar').classList.remove('show');
  showToast('已儲存設定！');
}

function discardChanges() {
  if (!confirm('確定要放棄所有變更嗎？')) return;
  stagesData = JSON.parse(JSON.stringify(originalData));
  hasChanges = false;
  document.getElementById('saveBar').classList.remove('show');
  renderStages();
  updateStats();
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

// Check for unsaved changes on page unload
window.addEventListener('beforeunload', (e) => {
  if (hasChanges) {
    e.preventDefault();
    e.returnValue = '';
  }
});
</script>

</body>
</html>
