<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<title>乘法小鎮 - Pixel Sprite Pack</title>
<style>
  body {
    font-family: -apple-system, sans-serif;
    background: #0a0a12;
    color: #fff;
    padding: 20px;
    margin: 0;
  }
  h1 { text-align: center; color: #ffd700; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 20px;
    max-width: 1100px;
    margin: 0 auto;
  }
  .sprite-card {
    background: #16162a;
    border: 2px solid #333;
    border-radius: 12px;
    padding: 16px;
    text-align: center;
  }
  .sprite-card h3 {
    margin: 8px 0;
    font-size: 14px;
    color: #ffd700;
  }
  canvas {
    image-rendering: pixelated;
    border: 1px solid #444;
    background: #1a1a2e;
    border-radius: 4px;
  }
  button {
    margin-top: 10px;
    padding: 8px 16px;
    background: #4a90e2;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
  }
  button:hover { background: #357abd; }
</style>
</head>
<body>

<h1>⚔️ 乘法小鎮 - Pixel Sprite Pack</h1>
<p style="text-align:center; color:#888;">8-bit Arcade Style • 右鍵或按鈕下載 PNG</p>

<div class="grid">

  <!-- Knight -->
  <div class="sprite-card">
    <canvas id="knight" width="64" height="64"></canvas>
    <h3>騎士英雄</h3>
    <button onclick="downloadSprite('knight', 'knight.png')">下載 PNG</button>
  </div>

  <!-- Mage -->
  <div class="sprite-card">
    <canvas id="mage" width="64" height="64"></canvas>
    <h3>女法師</h3>
    <button onclick="downloadSprite('mage', 'mage.png')">下載 PNG</button>
  </div>

  <!-- Berserker -->
  <div class="sprite-card">
    <canvas id="berserker" width="64" height="64"></canvas>
    <h3>狂戰士</h3>
    <button onclick="downloadSprite('berserker', 'berserker.png')">下載 PNG</button>
  </div>

  <!-- Treasure Chest -->
  <div class="sprite-card">
    <canvas id="chest" width="64" height="64"></canvas>
    <h3>寶箱</h3>
    <button onclick="downloadSprite('chest', 'treasure.png')">下載 PNG</button>
  </div>

  <!-- Sword -->
  <div class="sprite-card">
    <canvas id="sword" width="64" height="64"></canvas>
    <h3>傳奇之劍</h3>
    <button onclick="downloadSprite('sword', 'sword.png')">下載 PNG</button>
  </div>

  <!-- Shield -->
  <div class="sprite-card">
    <canvas id="shield" width="64" height="64"></canvas>
    <h3>守護之盾</h3>
    <button onclick="downloadSprite('shield', 'shield.png')">下載 PNG</button>
  </div>

</div>

<script>
// Draw Knight
function drawKnight(ctx) {
  ctx.fillStyle = '#4a90e2'; ctx.fillRect(5,2,6,4); // helmet
  ctx.fillStyle = '#2c5aa0'; ctx.fillRect(6,3,4,2);
  ctx.fillStyle = '#e74c3c'; ctx.fillRect(4,6,8,5); // body
  ctx.fillStyle = '#c0392b'; ctx.fillRect(5,7,6,3);
  ctx.fillStyle = '#4a90e2'; ctx.fillRect(2,7,2,3); ctx.fillRect(12,7,2,3);
  ctx.fillStyle = '#bdc3c7'; ctx.fillRect(13,4,1,8); // sword
  ctx.fillStyle = '#7f8c8d'; ctx.fillRect(12,4,3,1);
  ctx.fillStyle = '#2c3e50'; ctx.fillRect(5,11,2,4); ctx.fillRect(9,11,2,4);
  ctx.fillStyle = '#1a252f'; ctx.fillRect(4,14,3,1); ctx.fillRect(9,14,3,1);
}

// Draw Mage
function drawMage(ctx) {
  ctx.fillStyle = '#9b59b6'; ctx.fillRect(4,1,8,3); // hat
  ctx.fillStyle = '#8e44ad'; ctx.fillRect(5,2,6,1);
  ctx.fillStyle = '#f39c12'; ctx.fillRect(5,4,6,2); // hair
  ctx.fillStyle = '#8e44ad'; ctx.fillRect(4,6,8,6); // robe
  ctx.fillStyle = '#9b59b6'; ctx.fillRect(5,7,6,4);
  ctx.fillStyle = '#f39c12'; ctx.fillRect(2,7,2,4); ctx.fillRect(12,7,2,4);
  ctx.fillStyle = '#ecf0f1'; ctx.fillRect(13,5,1,9); // staff
  ctx.fillStyle = '#e74c3c'; ctx.fillRect(12,5,3,1);
  ctx.fillStyle = '#2c3e50'; ctx.fillRect(5,12,2,3); ctx.fillRect(9,12,2,3);
}

// Draw Berserker
function drawBerserker(ctx) {
  ctx.fillStyle = '#e67e22'; ctx.fillRect(5,2,6,5); // head
  ctx.fillStyle = '#d35400'; ctx.fillRect(4,2,2,2); ctx.fillRect(10,2,2,2); // horns
  ctx.fillStyle = '#c0392b'; ctx.fillRect(4,7,8,5); // body
  ctx.fillStyle = '#e67e22'; ctx.fillRect(1,7,3,4); ctx.fillRect(12,7,3,4);
  ctx.fillStyle = '#7f8c8d'; ctx.fillRect(14,3,1,10); // axe
  ctx.fillStyle = '#95a5a6'; ctx.fillRect(11,3,4,2);
  ctx.fillStyle = '#2c3e50'; ctx.fillRect(5,12,2,3); ctx.fillRect(9,12,2,3);
}

// Draw Treasure Chest
function drawChest(ctx) {
  ctx.fillStyle = '#8B4513'; ctx.fillRect(3,6,10,7);
  ctx.fillStyle = '#A0522D'; ctx.fillRect(3,6,10,2);
  ctx.fillStyle = '#FFD700'; ctx.fillRect(3,8,10,1); // gold line
  ctx.fillStyle = '#FFD700'; ctx.fillRect(7,4,2,2); // lock
  ctx.fillStyle = '#B8860B'; ctx.fillRect(7,5,2,1);
}

// Draw Sword
function drawSword(ctx) {
  ctx.fillStyle = '#C0C0C0'; ctx.fillRect(7,2,2,14); // blade
  ctx.fillStyle = '#FFD700'; ctx.fillRect(6,1,4,2); // hilt top
  ctx.fillStyle = '#8B4513'; ctx.fillRect(5,3,6,2); // guard
  ctx.fillStyle = '#2F4F4F'; ctx.fillRect(7,16,2,3); // handle
}

// Draw Shield
function drawShield(ctx) {
  ctx.fillStyle = '#4169E1'; ctx.fillRect(4,2,8,12);
  ctx.fillStyle = '#FFD700'; ctx.fillRect(6,4,4,2);
  ctx.fillStyle = '#FFD700'; ctx.fillRect(6,8,4,2);
  ctx.fillStyle = '#FFD700'; ctx.fillRect(5,6,6,1);
  ctx.fillStyle = '#8B0000'; ctx.fillRect(7,10,2,3);
}

function drawAll() {
  const sprites = {
    knight: drawKnight,
    mage: drawMage,
    berserker: drawBerserker,
    chest: drawChest,
    sword: drawSword,
    shield: drawShield
  };

  for (let id in sprites) {
    const canvas = document.getElementById(id);
    if (canvas) {
      const ctx = canvas.getContext('2d');
      ctx.imageSmoothingEnabled = false;
      sprites[id](ctx);
    }
  }
}

function downloadSprite(id, filename) {
  const canvas = document.getElementById(id);
  const link = document.createElement('a');
  link.download = filename;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

window.onload = drawAll;
</script>

</body>
</html>
